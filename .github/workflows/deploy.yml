name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Fired by an app repo (e.g. ZeitDocs/Classification) when a release is published,
  # so the changelog rebuilds automatically. See .github/notify-website.example.yml.
  repository_dispatch:
    types: [release-published]
  # Safety net in case a dispatch is ever missed: rebuild once a day.
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but do NOT cancel an in-progress run —
# production Pages deployments should be allowed to complete.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Fine-grained PAT with `contents: read` on the app repos (private),
          # used by the GitHub Releases content loader at build time.
          RELEASES_TOKEN: ${{ secrets.RELEASES_TOKEN }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
